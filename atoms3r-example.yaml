esphome:
  name: srne-monitor
  friendly_name: SRNE Inverter Monitor
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_LOG_DEFAULT_LEVEL_INFO: "y"
      CONFIG_LOG_MAXIMUM_LEVEL_INFO: "y"

# AtomS3R has 8MB PSRAM in octal mode
psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: git
      url: ssh://git@github.com/RAR/esphome-srne-inverter.git
      ref: main
    refresh: 0s
    components: [srne_modbus, srne_inverter]
  - source:
      type: local
      path: ~/esphome-lp5562/esphome/components
    refresh: 0s
    components: [lp5562]

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "SRNE Monitor Fallback"
    password: !secret fallback_ap_password

mdns:
  services:
    - service: srne-monitor
      protocol: tcp
      port: 80
      txt:
        device: "srne-inverter-monitor"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

# UART for SRNE RS485 (HY2.0 4-pin connector on AtomS3R base; use GPIO38/GPIO39
# instead if wiring via the front Grove port)
uart:
  id: uart_0
  tx_pin: GPIO6
  rx_pin: GPIO5
  baud_rate: 9600
  rx_buffer_size: 256

srne_modbus:
  id: modbus0
  uart_id: uart_0
  # flow_control_pin: GPIO7   # optional, for manual-direction RS485 transceivers

srne_inverter:
  id: inv0
  srne_modbus_id: modbus0
  address: 0x01
  update_interval: 10s

binary_sensor:
  - platform: status
    name: "SRNE Monitor Status"
    id: device_status

  - platform: status
    id: wifi_status
    internal: true

  - platform: srne_inverter
    srne_inverter_id: inv0
    online_status:
      name: "Inverter Online"
      id: inv_online
    grid_present:
      name: "Grid Present"
      id: inv_grid_present
    inverter_on:
      name: "Inverter On"
      id: inv_on
    fault:
      name: "Inverter Fault"
      id: inv_fault
    split_phase_mode:
      name: "Split Phase Mode"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: srne_inverter
    srne_inverter_id: inv0
    battery_soc:
      name: "Battery SOC"
      id: inv_battery_soc
    battery_voltage:
      name: "Battery Voltage"
      id: inv_battery_voltage
    battery_current:
      name: "Battery Current"
      id: inv_battery_current

    pv1_voltage: { name: "PV1 Voltage" }
    pv1_current: { name: "PV1 Current" }
    pv1_power: { name: "PV1 Power" }
    pv2_voltage: { name: "PV2 Voltage" }
    pv2_current: { name: "PV2 Current" }
    pv2_power: { name: "PV2 Power" }
    pv_total_power:
      name: "PV Total Power"
      id: inv_pv_total_power
    pv_charge_current: { name: "PV Charge Current" }
    charge_power:
      name: "Charge Power"
      id: inv_charge_power

    bus_voltage: { name: "Bus Voltage" }
    grid_voltage:
      name: "Grid Voltage"
      id: inv_grid_voltage
    grid_current: { name: "Grid Current" }
    grid_frequency: { name: "Grid Frequency" }
    inverter_voltage: { name: "Inverter Voltage" }
    inverter_current: { name: "Inverter Current" }
    inverter_frequency: { name: "Inverter Frequency" }
    load_current: { name: "Load Current" }
    load_active_power:
      name: "Load Power"
      id: inv_load_power
    load_apparent_power: { name: "Load Apparent Power" }
    load_percent:
      name: "Load Percent"
      id: inv_load_percent
    battery_charge_current: { name: "Battery Charge Current" }

    heatsink_a_temperature: { name: "Heatsink A Temp" }
    heatsink_b_temperature: { name: "Heatsink B Temp" }
    heatsink_c_temperature: { name: "Heatsink C Temp" }

    # DC bus rails (undocumented; found via register scan, sum ≈ bus_voltage)
    dc_bus_positive_voltage: { name: "+DC Bus" }
    dc_bus_negative_voltage: { name: "-DC Bus" }

    # L2 (split-phase / parallel-120 second-leg). Populates when the inverter
    # is actively outputting on both legs (i.e. not in eco standby).
    inverter_voltage_l2: { name: "Inverter Voltage L2" }
    inverter_current_l2: { name: "Inverter Current L2" }
    load_current_l2: { name: "Load Current L2" }
    load_active_power_l2: { name: "Load Power L2" }
    load_apparent_power_l2: { name: "Load Apparent Power L2" }
    load_percent_l2: { name: "Load Percent L2" }
    # grid_voltage_l2: { name: "Grid Voltage L2" }    # uncomment if grid is wired

    # L1+L2 combined (= 240V line-to-line on split-phase; sum on parallel-120)
    inverter_voltage_l1_l2: { name: "Inverter Voltage L1+L2" }
    inverter_current_total: { name: "Inverter Current Total" }
    load_current_total: { name: "Load Current Total" }
    load_active_power_total: { name: "Load Power Total" }
    load_apparent_power_total: { name: "Load Apparent Power Total" }

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

  - platform: version
    name: "ESPHome Version"

  - platform: srne_inverter
    srne_inverter_id: inv0
    machine_state:
      name: "Machine State"
      id: inv_machine_state
    charge_state:
      name: "Charge State"
      id: inv_charge_state
    fault_codes:
      name: "Fault Codes"
    software_version:
      name: "Inverter Firmware"
    hardware_version:
      name: "Inverter Hardware"
    serial_number:
      name: "Inverter Serial"

switch:
  - platform: restart
    name: "Restart"

  - platform: srne_inverter
    srne_inverter_id: inv0
    eco_mode:
      name: "Eco Mode"
    overload_auto_restart:
      name: "Overload Auto Restart"
    overheat_auto_restart:
      name: "Overheat Auto Restart"

# Writable settings — exposed via Modbus function 0x06. Optional; only the
# entities you configure get polled (settings poll runs every ~5 minutes).
select:
  - platform: srne_inverter
    srne_inverter_id: inv0
    output_priority:
      name: "Output Priority"
    charge_priority:
      name: "Charge Priority"
    battery_type:
      name: "Battery Type"

number:
  - platform: srne_inverter
    srne_inverter_id: inv0
    max_charge_current:
      name: "Max Charge Current"
    mains_charge_current_limit:
      name: "Mains Charge Current Limit"
    output_voltage:
      name: "Output Voltage"

# AtomS3R LCD: ST7789V 128x128 over SPI
spi:
  clk_pin: GPIO15
  mosi_pin: GPIO21

# AtomS3R I2C (LP5562 RGB driver lives here)
i2c:
  - id: atom_i2c_bus
    sda: 45
    scl: 0
    scan: true

display:
  - platform: st7789v
    id: atoms3r_lcd
    model: CUSTOM
    height: 128
    width: 128
    offset_height: 2
    offset_width: 1
    cs_pin: GPIO14
    dc_pin: GPIO42
    reset_pin: GPIO48
    rotation: 180
    eightbitcolor: true
    data_rate: 40Mhz
    update_interval: 5s
    lambda: |-
      it.fill(COLOR_BLACK);

      // Header
      it.print(64, 4, id(font_title), COLOR_WHITE, TextAlign::TOP_CENTER, "SRNE");
      it.print(64, 19, id(font_tiny), Color(150, 150, 150), TextAlign::TOP_CENTER, "Solar Inverter");
      it.line(8, 32, 120, 32, Color(100, 100, 100));

      // Battery SOC — big and centered
      if (!std::isnan(id(inv_battery_soc).state)) {
        Color soc_color = COLOR_GREEN;
        float soc = id(inv_battery_soc).state;
        if (soc < 20.0f) soc_color = COLOR_RED;
        else if (soc < 50.0f) soc_color = COLOR_ORANGE;
        it.printf(64, 36, id(font_large), soc_color, TextAlign::TOP_CENTER, "%.0f%%", soc);
      } else {
        it.print(64, 42, id(font_medium), Color(120, 120, 120), TextAlign::TOP_CENTER, "--");
      }

      // Battery V / A row
      if (!std::isnan(id(inv_battery_voltage).state)) {
        it.printf(64, 66, id(font_small), COLOR_WHITE, TextAlign::TOP_CENTER,
                  "%.1fV  %+.1fA",
                  id(inv_battery_voltage).state,
                  std::isnan(id(inv_battery_current).state) ? 0.0f : id(inv_battery_current).state);
      }

      // Power row: PV in, Load out
      float pv_w = std::isnan(id(inv_pv_total_power).state) ? 0.0f : id(inv_pv_total_power).state;
      float load_w = std::isnan(id(inv_load_power).state) ? 0.0f : id(inv_load_power).state;
      it.printf(8, 82, id(font_small), COLOR_ORANGE, TextAlign::TOP_LEFT, "PV %.0fW", pv_w);
      it.printf(120, 82, id(font_small), Color(120, 180, 255), TextAlign::TOP_RIGHT, "L %.0fW", load_w);

      // Status line at bottom
      Color dot_color = Color(120, 120, 120);
      const char *status = "Unknown";
      if (id(inv_fault).state) {
        dot_color = COLOR_RED;
        status = "FAULT";
      } else if (id(inv_on).state) {
        dot_color = COLOR_GREEN;
        status = id(inv_grid_present).state ? "Hybrid" : "Off-grid";
      } else if (id(inv_grid_present).state) {
        dot_color = Color(120, 180, 255);
        status = "Mains";
      } else if (id(inv_online).state) {
        dot_color = COLOR_ORANGE;
        status = "Idle";
      } else {
        dot_color = COLOR_RED;
        status = "Offline";
      }
      it.filled_circle(10, 116, 4, dot_color);
      it.print(20, 113, id(font_small), dot_color, TextAlign::CENTER_LEFT, status);

      // WiFi dot (top right)
      it.filled_circle(120, 8, 3, id(wifi_status).state ? COLOR_GREEN : COLOR_RED);

color:
  - id: COLOR_BLACK
    red: 0%
    green: 0%
    blue: 0%
  - id: COLOR_WHITE
    red: 100%
    green: 100%
    blue: 100%
  - id: COLOR_GREEN
    red: 0%
    green: 100%
    blue: 0%
  - id: COLOR_RED
    red: 100%
    green: 0%
    blue: 0%
  - id: COLOR_ORANGE
    red: 100%
    green: 65%
    blue: 0%

font:
  - file: "gfonts://Roboto@bold"
    id: font_title
    size: 14
  - file: "gfonts://Roboto@bold"
    id: font_large
    size: 36
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 9

lp5562:
  id: rgb_driver
  i2c_id: atom_i2c_bus

output:
  - platform: lp5562
    id: lp5562_red
    lp5562_id: rgb_driver
    channel: 0
  - platform: lp5562
    id: lp5562_green
    lp5562_id: rgb_driver
    channel: 1
  - platform: lp5562
    id: lp5562_blue
    lp5562_id: rgb_driver
    channel: 2
  - platform: lp5562
    id: backlight_output
    lp5562_id: rgb_driver
    channel: 3

light:
  - platform: rgb
    name: "Status LED"
    id: status_led
    red: lp5562_red
    green: lp5562_green
    blue: lp5562_blue
    restore_mode: ALWAYS_ON
    default_transition_length: 0.5s

  - platform: monochromatic
    name: "LCD Backlight"
    id: lcd_backlight
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.5s

# Drive the RGB LED from inverter state
# Red    = fault
# Green  = inverter actively powering loads from battery/PV
# Blue   = mains/grid powered, no fault
# Orange = online but idle (waiting, standby)
# Off    = inverter offline
interval:
  - interval: 5s
    then:
      - lambda: |-
          auto call = id(status_led).turn_on();
          call.set_transition_length(500);
          if (id(inv_fault).state) {
            call.set_rgb(1.0, 0.0, 0.0);
          } else if (id(inv_on).state) {
            call.set_rgb(0.0, 1.0, 0.0);
          } else if (id(inv_grid_present).state) {
            call.set_rgb(0.0, 0.3, 1.0);
          } else if (id(inv_online).state) {
            call.set_rgb(1.0, 0.4, 0.0);
          } else {
            call = id(status_led).turn_off();
            call.set_transition_length(500);
          }
          call.perform();
